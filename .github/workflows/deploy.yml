name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install mil-kit
        run: pip install mil-kit

      - name: Install MDD CLI
        run: cargo install mdd_api

      - name: Extract MDD data
        working-directory: db/data
        run: |
          curl -L -o MDD.zip https://github.com/mammaldiversity/mammaldiversity.github.io/raw/master/assets/data/MDD.zip
          mdd zip -i MDD.zip

      - name: Extract MIL data
        working-directory: db/data
        run: |
          MIL_URL=$(curl -s https://api.github.com/repos/mammaldiversity/asm-mil/releases/latest \
            | grep -o '"browser_download_url": *"[^"]*\.tar\.gz"' \
            | grep -o 'https://[^"]*')
          MIL_FILENAME=$(basename "$MIL_URL")
          MIL_DIRNAME="${MIL_FILENAME%.tar.gz}"

          echo "Downloading MIL data from $MIL_URL"
          curl -L -o "$MIL_FILENAME" "$MIL_URL"

          echo "Extracting $MIL_FILENAME to $MIL_DIRNAME"
          tar -xzf "$MIL_FILENAME"

          echo "MIL data extracted to $MIL_DIRNAME"
          MDD_FILE=$(ls MDD/MDD_v*.csv)
          MIL_DATE="${MIL_DIRNAME#mil-v}"

          echo "Processing MIL data for date $MIL_DATE using MDD file $MDD_FILE"
          mil-kit mdd --mil-file "$MIL_DIRNAME/metadata/mil-$MIL_DATE.xlsx" --mdd-file "$MDD_FILE" --output mil

      - name: Copy MIL images to Astro assets
        working-directory: db/data
        run: |
          MIL_DIRNAME=$(ls -d mil-v*/ | head -1 | tr -d '/')
          mkdir -p ../../public/mil-images
          find "$MIL_DIRNAME/images-400px-webp" -name "*.webp" -exec mv {} ../../public/mil-images/ \;

      - name: Validate MIL images in assets
        run: |
          IMAGE_COUNT=$(find public/mil-images -name "*.webp" | wc -l)
          echo "Found $IMAGE_COUNT .webp files in public/mil-images"
          if [ "$IMAGE_COUNT" -eq 0 ]; then
            echo "ERROR: No .webp images found in public/mil-images. Aborting."
            exit 1
          fi

      - name: Cleaning up data files
        working-directory: db/data
        run: |
          rm MDD.zip

      - name: Install, build, and upload your site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
